name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: research
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      # External-dependency tests are NOT run here, by policy (no secrets, no cost,
      # reliable runs). Their logic is covered by mocked unit tests, which DO run.
      #  - Model-dependent (ingestion/retrieval/embedding-dim): Hugging Face rate-limits
      #    shared CI runner IPs (HTTP 429), so downloads are unreliable. Covered locally
      #    (cached model) and the model is baked into the Docker image.
      #  - Live web (Tavily, RUN_WEB_TESTS) and live LLM (OpenAI, RUN_LLM_TESTS): need
      #    API-key secrets and cost tokens.
      # CI therefore covers all unit tests + the Postgres schema test.
      - name: Test
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/research
          RUN_DB_TESTS: "1"
        run: pytest -q
